# Serves the built TmuxLegends SPA. Client-side view state means any unknown path
# should fall back to index.html rather than 404.
server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Security headers. Set at server level so the SPA document (served via the
    # `location /` fallback) and the /api/ proxy inherit them. NOTE: nginx's
    # add_header inheritance is replace-not-merge — any location that defines its
    # own add_header (e.g. /assets/) drops these, which is fine for subresources.
    # CSP is tuned to what the app actually loads: same-origin scripts, inline
    # styles (framer-motion / Tailwind), https+data images (OAuth avatars,
    # emoji), self fonts, and exactly one external connect target — the GitHub
    # star-count API. The 3D Hero's character GLBs are meshopt-compressed, so
    # three.js instantiates a WebAssembly decoder — `'wasm-unsafe-eval'` permits
    # that (WASM only, not JS eval) and `worker-src blob:` covers its worker.
    # Without them the WebGL tier's models fail to load.
    add_header X-Frame-Options        "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; font-src 'self'; connect-src 'self' https://api.github.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

    gzip            on;
    gzip_types      text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Fingerprinted assets (Vite adds a content hash) can be cached forever.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # Backend API (optional accounts + score sharing) - see server/README.md.
    #
    # The upstream goes through a VARIABLE deliberately. With a literal
    # `proxy_pass http://api:3001`, nginx resolves the host at startup and
    # refuses to boot ("host not found in upstream") wherever no `api` service
    # exists - which would break the standalone image this repo publishes.
    # A variable defers resolution to request time, so /api/ simply 502s and the
    # app degrades to offline mode, exactly as game/account.ts expects.
    # $request_uri is passed explicitly: once proxy_pass contains a variable,
    # nginx no longer derives the upstream URI from the location, and the API
    # routes on the full "/api/..." path.
    location /api/ {
        resolver 127.0.0.11 ipv6=off valid=10s; # docker's embedded DNS
        set $api_upstream http://api:3001;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # Everything else falls back to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
