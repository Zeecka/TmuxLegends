# Hot-reload development stack (no image build - source is bind-mounted).
#
#   docker compose -f docker-compose.dev.yml up          # start (foreground)
#   docker compose -f docker-compose.dev.yml up -d       # start (background)
#   docker compose -f docker-compose.dev.yml down        # stop
#
# The Vite dev server (HMR) serves the app on http://localhost:8972 with the
# repo bind-mounted, so editing any file under src/ reloads the browser
# automatically - no rebuild, no restart. The API runs with `node --watch`, so
# server/ edits restart it too. Mirrors VimLegends's dev stack.
#
# Prod (docker-compose.yml, :8974) is a SEPARATE project, so the two stacks run
# side by side. Without these explicit names both default to the directory name
# and, sharing a service key `api`, each `up` would recreate the other's container.
name: tmuxlegends-dev

services:
  web:
    image: node:22-alpine
    container_name: tmuxlegends-dev
    working_dir: /app
    # Install into the container-only node_modules volume (musl binaries for
    # vite/esbuild/tailwind), then start Vite bound to all interfaces.
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8974"
    # Bound to loopback on 8974 to match the prod stack, so the host proxy for
    # tmuxlegends.com reaches this dev server unchanged.
    ports:
      - "127.0.0.1:8974:8974"
    environment:
      # The API is a sibling service here, not localhost.
      VITE_API_TARGET: http://api:3001
      # inotify is unreliable over bind mounts - poll so HMR still fires.
      VITE_USE_POLLING: "true"
      # Served behind the public HTTPS proxy for tmuxlegends.com: allow the
      # host and point the HMR socket at wss://<host>:443 (see vite.config.ts).
      VITE_PUBLIC_HOST: tmuxlegends.com
    volumes:
      - .:/app
      - tmuxlegends-node-modules:/app/node_modules
    depends_on:
      - api
    restart: unless-stopped

  # Optional: without OAuth credentials this serves no providers and the app
  # stays in offline mode. Stop it entirely and /api just 502s - also fine.
  api:
    image: node:24-alpine
    container_name: tmuxlegends-api-dev
    working_dir: /app
    # node --watch restarts the server on any change under server/.
    command: node --experimental-sqlite --watch index.mjs
    volumes:
      - ./server:/app
      - tmuxlegends-dev-data:/data
    environment:
      PORT: "3001"
      DB_PATH: /data/tmuxlegends.db
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:8972}
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret-change-me}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    restart: unless-stopped

volumes:
  # Keeps the container's node_modules off the host bind-mount (avoids glibc vs
  # musl native-binary clashes) and persists it between runs.
  tmuxlegends-node-modules:
  # Dev keeps its OWN accounts DB, deliberately not shared with prod. This
  # container runs as root while the prod image runs as `node`; one volume
  # between them means whichever creates it first sets the ownership, and the
  # other then dies with "attempt to write a readonly database". Separate
  # volumes remove the coupling - and a throwaway dev DB is what you want anyway.
  tmuxlegends-dev-data:
