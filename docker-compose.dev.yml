# Hot-reload development stack (no image build - source is bind-mounted).
#
#   docker compose -f docker-compose.dev.yml up          # start (foreground)
#   docker compose -f docker-compose.dev.yml up -d       # start (background)
#   docker compose -f docker-compose.dev.yml down        # stop
#
# The Vite dev server (HMR) serves the app on http://localhost:8972 with the
# repo bind-mounted, so editing any file under src/ reloads the browser
# automatically - no rebuild, no restart. The optional accounts API runs
# alongside it; Vite proxies /api to it (see VITE_API_TARGET in vite.config.ts).
services:
  web:
    image: node:22-alpine
    container_name: tmuxpert-dev
    working_dir: /app
    # Install into the container-only node_modules volume (musl binaries for
    # vite/esbuild/tailwind), then start Vite bound to all interfaces.
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8972"
    ports:
      - "8972:8972"
    environment:
      # inotify is unreliable over bind mounts - poll so HMR still fires.
      VITE_USE_POLLING: "true"
      # The API is a sibling service here, not localhost.
      VITE_API_TARGET: http://api:3001
    volumes:
      - .:/app
      - tmuxpert-node-modules:/app/node_modules
    restart: unless-stopped

  # Optional: without OAuth credentials this serves no providers and the app
  # stays in offline mode. Stop it entirely and /api just 502s - also fine.
  api:
    build: ./server
    container_name: tmuxpert-api-dev
    restart: unless-stopped
    volumes:
      - tmuxpert-dev-data:/data
    environment:
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:8972}
      SESSION_SECRET: ${SESSION_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}

volumes:
  # Keeps the container's node_modules off the host bind-mount (avoids glibc vs
  # musl native-binary clashes) and persists it between runs.
  tmuxpert-node-modules:
  tmuxpert-dev-data:
